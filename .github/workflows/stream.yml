name: Ayoub TV Professional 7-Channel Controller

on:
  workflow_dispatch:
    inputs:
      action_type:
        description: 'start أو stop'
        required: true
      channel_id:
        description: 'رقم القناة من 1 إلى 7'
        required: true
      m3u8_url:
        description: 'رابط m3u8'
        required: false
      stream_key:
        description: 'Stream Key'
        required: false

jobs:
  manage-stream:
    runs-on: ubuntu-latest
    steps:
      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Handle Stream Action
        run: |
          CHANNEL="${{ github.event.inputs.channel_id }}"
          ACTION="${{ github.event.inputs.action_type }}"
          M3U8="${{ github.event.inputs.m3u8_url }}"
          KEY="${{ github.event.inputs.stream_key }}"

          if [ "$ACTION" == "start" ]; then
            echo "📡 جاري إطلاق القناة رقم $CHANNEL..."
            ffmpeg -re -i "$M3U8" -c:v copy -c:a aac -b:a 128k -f flv "rtmps://live-api-s.facebook.com:443/rtmp/$KEY"
          else
            echo "🛑 تم إيقاف القناة رقم $CHANNEL"
          fi
