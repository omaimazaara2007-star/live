<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Ayoub TV - Pro Live Panel v5</title>
    <!-- CSS كاين ف الكود اللي صيفطت ليك قبل، غي نسخ هاد السكربت لتحت -->
</head>
<body>
    <!-- (نفس الواجهة) -->
    <script>
        // ... (نفس الدوال السابقة)
        
        async function triggerWorkflow(channelNum, action) {
            const token = document.getElementById('githubToken').value;
            const user = document.getElementById('githubUser').value;
            const repo = document.getElementById('githubRepo').value;
            const streamUrl = document.getElementById(`stream-${channelNum}`).value;
            const streamKey = document.getElementById(`key-${channelNum}`).value;

            // هنا استعملنا رابط CORS Proxy باش ندوزو الطلب بلا مشاكل
            const url = `https://corsproxy.io/?https://api.github.com/repos/${user}/${repo}/actions/workflows/stream.yml/dispatches`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({
                        ref: 'main',
                        inputs: {
                            channel: channelNum.toString(),
                            action: action,
                            stream_url: streamUrl,
                            stream_key: streamKey
                        }
                    })
                });

                if (response.ok) {
                    alert('✅ تمت العملية بنجاح!');
                } else {
                    alert('❌ فشل الاتصال! تأكد من الـ Token والاسم.');
                }
            } catch (error) { alert('خطأ ف الاتصال!'); }
        }
    </script>
</body>
</html>
