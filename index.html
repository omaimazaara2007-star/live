<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Ayoub TV - Classic Panel</title>
    <style>
        body { background-color: #0f172a; color: white; padding: 20px; font-family: sans-serif; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #334155; background: #0f172a; color: white; }
        button { width: 100%; padding: 12px; background: #10b981; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <input type="password" id="token" placeholder="GitHub Token">
        <input type="text" id="user" placeholder="Username" value="omaimazaara2007-star">
        <input type="text" id="repo" placeholder="Repo Name" value="live">
    </div>
    <div class="card">
        <input type="text" id="channel" placeholder="رقم القناة">
        <input type="text" id="url" placeholder="رابط البث m3u8">
        <input type="text" id="key" placeholder="Stream Key">
        <button onclick="send('start')">إطلاق (Start)</button>
        <button onclick="send('stop')" style="background:#ef4444; margin-top:10px;">إيقاف (Stop)</button>
    </div>

    <script>
        async function send(action) {
            const token = document.getElementById('token').value;
            const user = document.getElementById('user').value;
            const repo = document.getElementById('repo').value;
            const channel = document.getElementById('channel').value;
            const url = document.getElementById('url').value;
            const key = document.getElementById('key').value;

            const res = await fetch(`https://api.github.com/repos/${user}/${repo}/actions/workflows/stream.yml/dispatches`, {
                method: 'POST',
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
                body: JSON.stringify({
                    ref: 'main',
                    inputs: {
                        action_type: action,
                        channel_id: channel,
                        m3u8_url: url,
                        stream_key: key
                    }
                })
            });

            if (res.ok) alert('تم الإرسال بنجاح!');
            else alert('خطأ في الاتصال!');
        }
    </script>
</body>
</html>
