<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Ayoub TV Panel</title>
    <style>
        body { background: #0f172a; color: white; padding: 20px; font-family: sans-serif; }
        .card { background: #1e293b; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        input { width: 100%; padding: 8px; margin: 5px 0; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 5px; }
        button { padding: 10px; background: #10b981; border: none; color: white; cursor: pointer; width: 100%; border-radius: 5px; margin-top: 5px; }
    </style>
</head>
<body>
    <h3>لوحة تحكم Ayoub TV</h3>
    <div class="card">
        <input type="password" id="token" placeholder="GitHub Token">
        <input type="text" id="user" placeholder="Username" value="omaimazaara2007-star">
        <input type="text" id="repo" placeholder="Repo Name" value="live">
    </div>
    <div class="card">
        <input type="text" id="url" placeholder="m3u8 Link">
        <input type="text" id="key" placeholder="Stream Key">
        <button onclick="go()">إطلاق القناة 1</button>
    </div>
    <script>
        async function go() {
            const token = document.getElementById('token').value;
            const user = document.getElementById('user').value;
            const repo = document.getElementById('repo').value;
            const url = document.getElementById('url').value;
            const key = document.getElementById('key').value;

            const res = await fetch(`https://api.github.com/repos/${user}/${repo}/actions/workflows/stream.yml/dispatches`, {
                method: 'POST',
                headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
                body: JSON.stringify({ ref: 'main', inputs: { channel: "1", action: "start", stream_url: url, stream_key: key } })
            });

            if (res.ok) alert('✅ تم الإرسال!');
            else alert('❌ خطأ! تأكد من البيانات.');
        }
    </script>
</body>
</html>
