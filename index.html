<script>
    async function triggerWorkflow(channelNum, action) {
        const token = document.getElementById('token').value;
        const user = document.getElementById('user').value;
        const repo = document.getElementById('repo').value;
        const url = document.getElementById('url').value;
        const key = document.getElementById('key').value;

        const response = await fetch(`https://api.github.com/repos/${user}/${repo}/actions/workflows/stream.yml/dispatches`, {
            method: 'POST',
            headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
            body: JSON.stringify({
                ref: 'main',
                inputs: {
                    action_type: action,    // تطابق مع stream.yml
                    channel_id: channelNum.toString(), // تطابق مع stream.yml
                    m3u8_url: url,         // تطابق مع stream.yml
                    stream_key: key        // تطابق مع stream.yml
                }
            })
        });

        if (response.ok) alert('✅ تم الإرسال بنجاح!');
        else alert('❌ فشل الاتصال، تأكد من الـ Token!');
    }
</script>
